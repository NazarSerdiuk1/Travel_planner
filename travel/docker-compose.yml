services:
  travel_planner:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    command: >
      sh -c "
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:14-alpine
    restart: always
    env_file:
      - .env
    volumes:
      - my_db:/var/lib/postgresql/data
    ports:
      - "5433:5432"

volumes:
  my_db: